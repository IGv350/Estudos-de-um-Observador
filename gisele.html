<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquivo Classificado</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; 
            align-items: center;     
            height: 100vh;           
            overflow: hidden;        
        }

        /* Removido o ponteiro de link padrão para controlar via JS */
        .container-olho {
            cursor: pointer;
            border: none;
            background: none;
            outline: none;
            padding: 0;
        }

        .container-olho img {
            max-width: 80%;          
            height: auto;
            border-radius: 15px;     
            transition: transform 0.5s ease, filter 0.5s ease; 
        }

        .container-olho img:hover {
            transform: scale(1.05);  
            filter: brightness(1.2); 
        }

        /* Efeito de tremor opcional quando clica */
        .tremendo {
            animation: tremor 0.1s infinite;
        }

        @keyframes tremor {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            40% { transform: translate(-3px, 0px) rotate(1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(-1px, 2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <audio id="musicaFundo">
        <source src="Morta_por_dancar.mp3" type="audio/mpeg">
    </audio>

    <div class="container-olho" onclick="iniciarSequencia(this)">
        <img src="Pupila.png" alt="olho" id="imagemOlho">
    </div>

    <script>
        function iniciarSequencia(elemento) {
            const audio = document.getElementById('musicaFundo');
            const imagem = document.getElementById('imagemOlho');
            
            // 1. Toca a música
            audio.play().catch(e => console.log("Erro ao tocar: ", e));

            // 2. Adiciona um efeito visual de tremor (opcional, para dar tensão)
            imagem.classList.add('tremendo');

            // 3. Espera 15 segundos (15000 milissegundos)
            setTimeout(function() {
                // 4. Para a música
                audio.pause();
                
                // 5. Redireciona para o link
                window.location.href = "https://youtu.be/cC6M6aX_sQQ";
            }, 15000); 
        }
    </script>

</body>
</html>
